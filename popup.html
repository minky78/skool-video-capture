<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skool Video Capture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --accent:    #4CAF50;
      --accent-hv: #43A047;
      --text:      #e0e0e0;
      --text-dim:  #9e9e9e;
      --border:    #2a2a4a;
      --danger:    #e53935;
      --warning:   #ff9800;
      --info:      #2196f3;
      --radius:    8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 420px;
      min-height: 200px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 15px; font-weight: 600; flex: 1; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status-dot.idle { background: var(--text-dim); }
    .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.downloading { background: var(--info); box-shadow: 0 0 6px var(--info); }

    .section { margin-bottom: 12px; }
    .section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-dim); margin-bottom: 4px; font-weight: 500;
    }

    /* Video info card */
    .video-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px;
    }
    .platform-badge {
      display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase;
      padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;
    }
    .platform-badge.skool { background: #d3513e; color: #fff; }
    .platform-badge.loom  { background: #625DF5; color: #fff; }
    .platform-badge.vimeo { background: #1ab7ea; color: #fff; }
    .platform-badge.wistia{ background: #4a90e2; color: #fff; }
    .platform-badge.youtube{background: #ff0000; color: #fff; }
    .platform-badge.other { background: var(--border); color: var(--text-dim); }

    .video-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .host-label { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }

    /* Quality dropdown */
    .quality-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .quality-row select {
      flex: 1; padding: 6px 8px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 12px; outline: none;
    }
    .quality-row select:focus { border-color: var(--accent); }

    /* Buttons */
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      padding: 7px 12px; border: none; border-radius: var(--radius);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; flex: 1; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hv); }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); }
    .btn-copy { background: transparent; color: var(--info); border: 1px solid var(--info); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

    /* Download manager */
    .dl-manager { margin-top: 10px; }
    .dl-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px;
    }
    .dl-item-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
    .dl-status { font-weight: 600; }
    .dl-status.dispatched { color: var(--info); }
    .dl-status.downloading { color: var(--accent); }
    .dl-status.finished { color: var(--accent); }
    .dl-status.error { color: var(--danger); }

    /* Progress bar */
    .progress-track {
      height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin: 6px 0;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s ease; width: 0%;
    }
    .progress-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); }

    /* Empty state */
    .empty-state { text-align: center; padding: 20px 0; color: var(--text-dim); }
    .empty-state .icon { font-size: 28px; margin-bottom: 6px; opacity: 0.4; }
    .empty-state p { font-size: 11px; line-height: 1.5; }

    /* Manual entry */
    .fallback-section { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 8px; }
    .fallback-section input {
      width: 100%; padding: 7px 8px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 11px; font-family: monospace;
      margin-bottom: 6px; outline: none;
    }
    .fallback-section input:focus { border-color: var(--accent); }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 8px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-dim);
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 12px; left: 12px; right: 12px;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: var(--radius); padding: 8px 12px; font-size: 11px;
      text-align: center; opacity: 0; transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.error { border-color: var(--danger); }
  </style>
</head>
<body>
  <div class="header">
    <span class="status-dot idle" id="statusDot"></span>
    <h1>Skool Video Capture</h1>
  </div>

  <!-- Video detection area -->
  <div class="section">
    <div class="section-label">Detected Video</div>
    <div id="captureDisplay">
      <div class="empty-state">
        <div class="icon">🎬</div>
        <p>Open a Skool course and play a video.<br>Metadata is detected automatically.</p>
      </div>
    </div>
  </div>

  <!-- Download manager -->
  <div class="section" id="dlManagerSection" style="display:none;">
    <div class="section-label">Download Manager</div>
    <div class="dl-manager" id="dlManager"></div>
  </div>

  <!-- Manual entry -->
  <div class="fallback-section">
    <div class="section-label">Manual Entry</div>
    <input type="text" id="manualUrl" placeholder="https://...m3u8 or ...mp4" spellcheck="false" autocomplete="off" />
    <button class="btn btn-secondary" id="manualInjectBtn" disabled style="width:100%">⤴ Track URL</button>
  </div>

  <div class="status-bar">
    <span id="tabInfo">No Skool tab detected</span>
    <span id="captureTime"></span>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
