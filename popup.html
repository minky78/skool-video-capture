<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skool Video Capture</title>
  <style>
    /* ─── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --accent:    #4CAF50;
      --accent-hv: #43A047;
      --text:      #e0e0e0;
      --text-dim:  #9e9e9e;
      --border:    #2a2a4a;
      --danger:    #e53935;
      --radius:    8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 380px;
      min-height: 200px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── Header ──────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .status-dot.idle {
      background: var(--text-dim);
      box-shadow: none;
    }

    /* ─── Sections ────────────────────────────────────────────────── */
    .section {
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* ─── Video card ──────────────────────────────────────────────── */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
    }

    .video-card .source-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .video-card .url-display {
      font-size: 11px;
      color: var(--text-dim);
      word-break: break-all;
      margin-bottom: 10px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      background: rgba(0,0,0,0.3);
      padding: 6px 8px;
      border-radius: 4px;
      max-height: 60px;
      overflow-y: auto;
    }

    .video-card .host-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* ─── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hv); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover { background: rgba(229, 57, 53, 0.1); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.05); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Fallback input ──────────────────────────────────────────── */
    .fallback-section {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }

    .fallback-section input {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.15s;
    }

    .fallback-section input:focus {
      border-color: var(--accent);
    }

    .fallback-section input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* ─── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: var(--text-dim);
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.6;
    }

    /* ─── Status bar ──────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ─── Toast ───────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .toast.error {
      border-color: var(--danger);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="status-dot" id="statusDot" title="Listening for streams"></span>
    <h1>Skool Video Capture</h1>
  </div>

  <!-- Captured video display -->
  <div class="section">
    <div class="section-label">Captured Stream</div>
    <div id="captureDisplay">
      <div class="empty-state">
        <div class="icon">🎬</div>
        <p>Open a Skool course and play a video.<br>
        Stream URLs are captured automatically.</p>
      </div>
    </div>
  </div>

  <!-- Fallback: manual entry -->
  <div class="fallback-section">
    <div class="section-label">Manual Entry</div>
    <input
      type="text"
      id="manualUrl"
      placeholder="https://...m3u8 or ...mp4"
      spellcheck="false"
      autocomplete="off"
    />
    <button class="btn btn-secondary" id="manualInjectBtn" disabled>
      ⤴ Track URL
    </button>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="tabInfo">No Skool tab detected</span>
    <span id="captureTime"></span>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
